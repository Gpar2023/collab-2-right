<!DOCTYPE html>
<html lang="en-us">
  <head>
    <!-- needed for `file:///` compat! -->
    <base href="https://cdn.jsdelivr.net/gh/Gpar2023/collab-2-right@main/">
    <!-- end -->
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Collab game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <!--<div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Collab game</div>
      </div>-->
    </div><script>
  var canvas = document.querySelector("#unity-canvas");
  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");
    function updateBannerVisibility() { warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; }
    var div = document.createElement('div'); div.innerHTML = msg; warningBanner.appendChild(div);
    if (type == 'error') div.style = 'background: red; padding: 10px;';
    else { if (type == 'warning') div.style = 'background: yellow; padding: 10px;'; setTimeout(function() { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000); }
    updateBannerVisibility();
  }

  async function loadSplitFile(baseName, totalParts) {
    const promises = [];
    for (let i = 1; i <= totalParts; i++) {
      promises.push(fetch(`${baseName}${i}`).then(res => {
        if (!res.ok) throw new Error(`Failed to fetch part ${i}`);
        return res.arrayBuffer();
      }));
    }
    const chunks = await Promise.all(promises);
    const combinedBlob = new Blob(chunks, { type: 'application/octet-stream' });
    return URL.createObjectURL(combinedBlob);
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/collab 2 right.loader.js";
  
  var config = {
    arguments: [],
    frameworkUrl: buildUrl + "/collab 2 right.framework.js",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "Collab game",
    productVersion: "0.1.0",
    showBanner: unityShowBanner,
  };

  config.matchWebGLToCanvasSize = true;
  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport'; meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  }
  document.querySelector("#unity-loading-bar").style.display = "block";
  (async () => {
    try {
      config.dataUrl = await loadSplitFile(`${buildUrl}/unitydata.data.part`, 3);
      config.codeUrl = await loadSplitFile(`${buildUrl}/unitywasm.wasm.part`, 5);
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          URL.revokeObjectURL(config.dataUrl);
          URL.revokeObjectURL(config.codeUrl);
        }).catch((message) => { alert(message); });
      };
      document.body.appendChild(script);
    } catch (err) {
      alert("Error loading game parts: " + err.message);
    }
  })();
</script>
  </body>
</html>
